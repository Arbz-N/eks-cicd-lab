apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
      - name: cicd-app
        image: CONTAINER_IMAGE       # CodeBuild yeh replace karega
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi